<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drive - charity: water</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen" aria-labelledby="start-screen-title">
            <div id="start-card">
                <p id="start-kicker">charity: water game</p>
                <h1 id="start-screen-title">Water Drive</h1>
                <p id="start-description">Use the arrow keys to guide the truck through the lanes and avoid the pollutants.</p>

                <div id="difficulty-panel">
                    <span class="panel-label">Choose a difficulty</span>
                    <div id="difficulty-controls" role="group" aria-label="Choose game difficulty">
                        <button type="button" class="difficulty-button" data-difficulty="easy">Easy</button>
                        <button type="button" class="difficulty-button active" data-difficulty="normal">Normal</button>
                        <button type="button" class="difficulty-button" data-difficulty="hard">Hard</button>
                    </div>
                </div>

                <button id="start-game-button" type="button">Start Game</button>
            </div>
        </div>

        <div id="ui-layer">
            <div id="score-display">Score: <span id="score">1000</span></div>
            <button id="pause-button" type="button">Pause</button>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <img id="charity-water-logo" src="img/cw_logo_horizontal.png" alt="charity: water logo">
    </div>
    <footer id="page-footer">
        <p>Visit <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charitywater.org</a> to learn more about our mission and donate today.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
